<!DOCTYPE html>
<html>
<head>
    <title>无数彩色爱心</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #ffe4e1 0%, #ff91a4 60%, #d81b60 100%);
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .heart {
            position: absolute;
            width: 30px;
            height: 27px;
            transform: translate(-50%, -50%) scale(0);
            animation: fly 4s linear infinite;
            opacity: 0;
        }
        .heart:before,
        .heart:after {
            content: "";
            position: absolute;
            width: 15px;
            height: 24px;
            background: currentColor;
            border-radius: 15px 15px 0 0;
        }
        .heart:before {
            left: 7.5px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }
        @keyframes fly {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0.8;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1.1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container"></div>
    <script>
        const container = document.getElementById('container');
        const hearts = 120;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        function randomBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        for (let i = 0; i < hearts; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            const angle = Math.random() * Math.PI * 2;
            const distance = randomBetween(220, 520);
            const dx = Math.cos(angle) * distance + 'px';
            const dy = Math.sin(angle) * distance + 'px';
            const hue = Math.floor(randomBetween(0, 360));
            const saturation = randomBetween(80, 100);
            const lightness = randomBetween(55, 75);
            const duration = randomBetween(3.5, 6.5).toFixed(2) + 's';
            const delay = randomBetween(-2, 2).toFixed(2) + 's';
           
            heart.style.left = centerX + 'px';
            heart.style.top = centerY + 'px';
            heart.style.color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            heart.style.setProperty('--dx', dx);
            heart.style.setProperty('--dy', dy);
            heart.style.animationDuration = duration;
            heart.style.animationDelay = delay;
            heart.style.filter = `drop-shadow(0 0 10px hsla(${hue}, ${saturation}%, ${lightness}%, 0.6))`;

            container.appendChild(heart);
        }

        window.addEventListener('resize', () => {
            const newCenterX = window.innerWidth / 2;
            const newCenterY = window.innerHeight / 2;
            document.querySelectorAll('.heart').forEach(heart => {
                heart.style.left = newCenterX + 'px';
                heart.style.top = newCenterY + 'px';
            });
        });
    </script>
</body>
</html>
